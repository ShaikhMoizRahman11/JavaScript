    // //     // Multiplication
         let mul = a * b;

    // //     // Division

        document.writeln("Division (b / a) = " + div + "<br>");

    // //     // Modulus gives remainder

        document.writeln("Modulus (b % a) = " + mod + "<br>");

    // //     // Exponentiation means power

        document.writeln("Exponentiation (a ** 5) = " + power + "<br>");
        console.log("Exponentiation (a ** 2) = " + power);

    // //     // Increment increases value by 1

        inc++;
        document.writeln("Increment (5++) = " + inc + "<br>");
        console.log("Increment (5++) = " + inc);

    // //     // Decrement decreases value by 1
        let dec = 5;
        dec--;
        document.writeln("Decrement (5--) = " + dec + "<br><br>");
