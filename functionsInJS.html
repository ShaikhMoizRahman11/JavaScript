    <h1>5. Pure Function</h1>
    <script>
        function income1(salary){
          return  salary*2;
        }
        document.writeln(income1(20000)+"<br>");
    </script>


    <h1>6. Impure Function</h1>
    <script>
        let inc=1000;
        function income(salary){
           return salary*2+inc;
        }
        document.writeln(income(5000)+"<br>");
    </script>


    <h1>7. Rest Parameters (...)</h1>
    <script>
        // Rest parameters - collect extra arguments into array


        function sum(...numbers) {
            let total = 0;
            for(let num of numbers) {
                total += num;
            }
            return total;
        }
        document.writeln("sum(1, 2, 3) = " + sum(1, 2, 3) + "<br>");
        document.writeln("sum(10, 20, 30, 40) = " + sum(10, 20, 30, 40,50) + "<br><br>");
    </script>


    <h1>8. Functions Calling Functions</h1>
    <script>
        // Functions can call other functions
        function calculateArea(length, width) {
            return length * width;
        }
        
        function printArea(shape, length, width) {
            let area = calculateArea(length, width);
            return shape + " area = " + area;
        }
        
        document.writeln("printArea('Rectangle', 5, 8) = " + printArea("Rectangle", 5, 8) + "<br>");
        document.writeln("printArea('Room', 12, 15) = " + printArea("Room", 12, 15) + "<br><br>");
    </script>

    <h1>10. Immediately Invoked Function (IIFE)</h1>
    <script>
        // IIFE - runs immediately when defined
        (function() {
            let secret = "I run immediately!";
            document.writeln("IIFE result: " + secret + "<br><br>");
        })();

    </script>

    <h1>12. Recursive Functions</h1>
    <script>
        // Recursive - function calls itself

        function factorial(n) {
            if (n <= 1) return 1;
            return n * factorial(n - 1);
        }
        
        document.writeln("factorial(0) = " + factorial(0) + "<br>");
        document.writeln("factorial(1) = " + factorial(1) + "<br><br>");
    </script>
