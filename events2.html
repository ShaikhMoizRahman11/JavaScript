<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JavaScript Events</title>

    <style>

        body{
            font-family: Arial, Helvetica, sans-serif;
            text-align: center;
            margin-top: 50px;
        }

        #box{
            height: 200px;
            width: 200px;
            background-color: lightblue;
            margin: auto;
            line-height: 200px;
            font-size: 22px;
            border-radius: 10px;
        }

        button{
            padding: 10px 20px;
            margin: 10px;
            font-size: 18px;
        }

        input{
            padding: 10px;
            width: 250px;
            font-size: 18px;
        }

    </style>
</head>
<body>

    <h1>JavaScript Events</h1>

    <div id="box">
        Hover Me
    </div>

    <br><br>

    <button id="dblBtn">Double Click</button>

    <button id="mouseBtn">Mouse Down</button>

    <br><br>

    <input type="text" id="focusInput" placeholder="Focus Event">

    <p id="message"></p>

    <script src="events2.js"></script>

</body>
</html>
